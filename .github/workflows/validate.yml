name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  schema:
    name: validate registry.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate registry.json against registry.schema.json
        uses: python-jsonschema/check-jsonschema@0.33.0
        with:
          schemafile: registry.schema.json
          files: registry.json
